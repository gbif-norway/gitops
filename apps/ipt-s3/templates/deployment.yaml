apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ipt
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ipt
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ipt
    spec:
      containers:
      - name: {{ .Release.Name }}-ipt
        image: gbifnorway/ipt-s3:{{ .Values.containerImageTag }}
        imagePullPolicy: Always
        resources:
{{ toYaml .Values.resources | indent 10 }}
        ports:
        - containerPort: 8080
          name: {{ .Release.Name }}-ipt
        volumeMounts:
        - name: pvc
          mountPath: /srv/ipt/
          subPath: {{ required "pvcSubPath is required" .Values.pvcSubPath }}
      volumes:
      - name: pvc
        persistentVolumeClaim:
          claimName: {{ required "sharedPvcName is required" .Values.sharedPvcName }}
