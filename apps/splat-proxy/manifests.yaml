apiVersion: apps/v1
kind: Deployment
metadata:
  name: slpat-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slpat-proxy
  template:
    metadata:
      labels:
        app: slpat-proxy
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: proxy
        image: ghcr.io/gbif-norway/splat-proxy:latest
        ports:
        - containerPort: 8080
        env:
        - name: ALLOWED_ORIGIN
          value: "https://gbif-norway.github.io,http://localhost:5173"
---
apiVersion: v1
kind: Service
metadata:
  name: slpat-proxy
spec:
  selector:
    app: slpat-proxy
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slpat-proxy
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 10000m
    # Add cert-manager annotations if you have it
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: proxy.svc.gbif.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slpat-proxy
            port:
              number: 80
  tls:
    - hosts:
        - proxy.svc.gbif.no
      secretName: slpat-proxy-cert